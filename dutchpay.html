<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>더치페이</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-title" content="더치페이"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F7F8;
  --card:#fff;
  --left-bg:#FAFAFA;
  --label:#111;
  --label2:#666;
  --label3:#B0B0B8;
  --sep:#EBEBED;
  --sep2:#D4D4D8;
  --fill:#F3F3F5;
  --fill2:#F8F8FA;
  --blue:#0071E3;
  --blue-bg:#EBF3FF;
  --blue-txt:#0055B8;
  --green:#1DAD53;
  --green-bg:#EDFAF3;
  --green-txt:#13823D;
  --red:#E53E3E;
  --red-bg:#FFF0F0;
  --r:16px;--rm:10px;--rs:9px;
  /* 좌측 패널 가로 padding (모든 행이 한 줄로 정렬되는 기준) */
  --pad-x:32px;
}
html,body{background:var(--bg);font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;font-size:14px;color:var(--label);min-height:100vh;}
input,select,button{font-family:inherit;}
button{cursor:pointer;}
svg{display:block;flex-shrink:0;}

/* ── DESKTOP ── */
.desktop-shell{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:48px 32px 80px;}
.desktop-app{display:grid;grid-template-columns:380px minmax(0,1fr);min-height:660px;width:100%;max-width:1100px;background:var(--card);border-radius:var(--r);border:1px solid var(--sep);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);}
.mobile-shell{display:none;}

/* ── MOBILE ── */
@media(max-width:700px){
  .desktop-shell{display:none;}
  .mobile-shell{display:block;background:var(--bg);min-height:100vh;}
  .mob-header{background:var(--card);padding:max(20px,calc(env(safe-area-inset-top,0px) + 12px)) 20px 4px;border-bottom:1px solid var(--sep);}
  .mob-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .mob-title{font-size:22px;font-weight:700;letter-spacing:-.4px;}
  .mob-tabs{display:flex;gap:0;}
  .mob-tab{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--label2);padding:10px 0 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
  .mob-tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
  .mob-body{padding:16px 16px 100px;}

  .mob-section{background:var(--card);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
  .mob-section-hd{padding:14px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between;}
  .mob-section-title{font-size:12px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;}
  .mob-clear-btn{font-size:12px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;}

  .mob-pin-wrap{padding:12px 16px;}
  .mob-pin-row{display:flex;gap:8px;margin-bottom:8px;}
  .mob-pin-row input{flex:1;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;min-width:0;}
  .mob-pin-row input:focus{border-color:var(--blue);}
  .mob-add-btn{border:none;background:var(--label);color:#fff;border-radius:var(--rs);padding:9px 16px;font-size:14px;font-weight:600;}
  .mob-hint{font-size:11px;color:var(--label3);margin-bottom:10px;}

  .mob-pills{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 14px;}
  .mob-empty-pills{padding:0 16px 14px;font-size:13px;color:var(--label3);}

  .mob-item-row{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer;animation:rowIn .25s ease;}
  .mob-item-row:last-child{border-bottom:none;}
  .mob-item-row.sel{background:var(--fill2);}
  .mob-item-dot{width:6px;height:6px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
  .mob-item-row.sel .mob-item-dot{background:var(--blue);}
  .mob-item-info{flex:1;min-width:0;}
  .mob-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mob-item-meta{font-size:11px;color:var(--label3);margin-top:2px;}
  .mob-item-amt{font-size:14px;font-weight:700;}
  .mob-add-item-row{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;}
  .mob-add-ic{width:24px;height:24px;border-radius:50%;background:var(--green-bg);color:var(--green-txt);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;}
  .mob-add-txt{font-size:14px;font-weight:500;color:var(--green);}

  .mob-total-bar{background:var(--card);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .mob-total-lbl{font-size:13px;color:var(--label2);}
  .mob-total-val{font-size:20px;font-weight:700;}

  /* SHEET overlay for item edit on mobile */
  .mob-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;}
  .mob-sheet-overlay.open{display:block;}
  .mob-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:0 0 40px;max-height:85vh;overflow-y:auto;z-index:101;transform:translateY(100%);transition:transform .28s cubic-bezier(.25,.8,.25,1);}
  .mob-sheet.open{transform:translateY(0);}
  .mob-sheet-handle{width:36px;height:4px;background:var(--sep2);border-radius:2px;margin:12px auto 16px;}
  .mob-sheet-title{font-size:16px;font-weight:700;padding:0 20px 16px;border-bottom:1px solid var(--sep);}
  .mob-sheet-body{padding:20px 20px 0;}
  /* 모바일에선 요약 카드 폰트 살짝 줄여 짧은 화면에도 한 줄 유지 */
  .stat-val{font-size:17px;}
  .stat-box{padding:14px 10px;}
}

/* ── SHARED LEFT PANEL ── */
.left{border-right:1px solid var(--sep);display:flex;flex-direction:column;background:var(--left-bg);}
.left-top{padding:28px var(--pad-x) 0;}
.app-label{font-size:11px;font-weight:600;color:var(--label3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.app-title{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.15;margin-bottom:18px;}
.tab-row{display:flex;gap:2px;background:var(--fill);border-radius:10px;padding:3px;margin-bottom:20px;}
.tab{flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--label2);padding:6px 0;border-radius:8px;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--card);color:var(--label);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}

.people-wrap{padding:0 0 14px;border-bottom:1px solid var(--sep);}
.sec-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-label{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;}
.clear-all-btn{font-size:11px;color:var(--red);border:none;background:transparent;font-weight:500;padding:0;cursor:pointer;}
.pin-row{display:flex;gap:6px;margin-bottom:6px;}
.pin-row input{flex:1;border:1px solid var(--sep2);border-radius:var(--rs);padding:7px 10px;font-size:13px;background:var(--card);color:var(--label);outline:none;min-width:0;}
.pin-row input:focus{border-color:var(--blue);}
.pin-btn{border:none;background:var(--label);color:#fff;border-radius:var(--rs);padding:7px 13px;font-size:13px;font-weight:600;}
.pin-hint{font-size:11px;color:var(--label3);margin-bottom:8px;}
.pills{display:flex;flex-wrap:wrap;gap:5px;min-height:20px;}
.pills-empty{font-size:12px;color:var(--label3);}
/* 음수 금액은 빨간색 (환불·생일턱 등) */
.amt-neg{color:var(--red);}
/* 토스트 알림 */
.toast-container{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:calc(100% - 32px);max-width:420px;}
.toast{background:var(--label);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:auto;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(20px);transition:opacity .25s,transform .25s;max-width:100%;line-height:1.4;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-msg{flex:1;}
.toast-action{background:transparent;color:#5BB0FF;border:none;font-size:14px;font-weight:700;cursor:pointer;padding:0 4px;font-family:inherit;white-space:nowrap;}
.toast-action:hover{color:#A0CFFF;}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}
.pill{display:inline-flex;align-items:center;gap:3px;background:var(--fill);border:1px solid var(--sep);border-radius:20px;padding:4px 7px 4px 10px;font-size:12px;font-weight:500;white-space:nowrap;animation:pillIn .2s ease;}
@keyframes pillIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.pill-x{border:none;background:none;color:var(--label3);padding:0;display:flex;align-items:center;}

.items-scroll{flex:1;overflow-y:auto;padding:14px 0 0;}
.items-scroll::-webkit-scrollbar{width:3px;}
.items-scroll::-webkit-scrollbar-thumb{background:var(--sep2);border-radius:2px;}
.ilist-label-row{display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad-x);margin-bottom:8px;gap:6px;}
.ilist-label{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;flex-shrink:0;}
.ilist-tools{display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end;}
.ilist-search{flex:1;max-width:140px;min-width:0;font-size:12px;padding:4px 8px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label);outline:none;}
.ilist-search:focus{border-color:var(--blue);}
.ilist-sort{font-size:11px;padding:4px 6px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label2);font-family:inherit;cursor:pointer;}
.ilist-sort:focus{border-color:var(--blue);}
.ilist-results-empty{padding:24px var(--pad-x);font-size:13px;color:var(--label3);text-align:center;}
.item-row{display:flex;align-items:center;gap:10px;padding:10px var(--pad-x);border-bottom:1px solid var(--sep);cursor:pointer;transition:background .12s;animation:rowIn .25s ease;}
@keyframes rowIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.item-row:hover,.item-row.sel{background:var(--fill);}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
.item-row.sel .item-dot{background:var(--blue);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--label3);margin-top:1px;}
.item-amt{font-size:13px;font-weight:700;flex-shrink:0;}
.add-row{display:flex;align-items:center;gap:10px;padding:11px var(--pad-x);cursor:pointer;transition:background .1s;}
.add-row:hover{background:var(--fill);}
.add-ic{width:22px;height:22px;border-radius:50%;background:var(--green-bg);color:var(--green-txt);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:400;line-height:1;flex-shrink:0;}
.add-txt{font-size:13px;font-weight:500;color:var(--green);}
.left-foot{border-top:1px solid var(--sep);padding:14px var(--pad-x);}
.foot-row{display:flex;align-items:baseline;justify-content:space-between;}
.foot-lbl{font-size:12px;color:var(--label2);}
.foot-val{font-size:20px;font-weight:700;}

/* ── RIGHT PANEL ── */
.right{display:flex;flex-direction:column;background:var(--card);}
.right-top{padding:28px 32px 20px;border-bottom:1px solid var(--sep);}
.r-eye{font-size:11px;font-weight:600;color:var(--label3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;}
.r-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px;}
.r-sub{font-size:13px;color:var(--label2);line-height:1.55;}
.right-body{flex:1;padding:24px 32px;overflow-y:auto;}
.right-body::-webkit-scrollbar{width:3px;}
.right-body::-webkit-scrollbar-thumb{background:var(--sep2);border-radius:2px;}

/* ── EDITOR ── */
.field-g{margin-bottom:18px;}
.field-lbl{font-size:11px;font-weight:600;color:var(--label2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;}
.field-inp{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;}
.field-inp:focus{border-color:var(--blue);}
.field-sel{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--label);outline:none;appearance:none;cursor:pointer;}
.amt-wrap{position:relative;}
.amt-wrap input{padding-left:44px;padding-right:30px;}
.amt-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--label3);pointer-events:none;}
.amt-sign-btn{position:absolute;left:4px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:1px solid var(--sep2);border-radius:6px;background:var(--card);color:var(--label3);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:all .12s;}
.amt-sign-btn:hover{border-color:var(--label3);}
.amt-sign-btn.on{background:var(--red);color:#fff;border-color:var(--red);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{border:1px solid var(--sep2);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;background:var(--card);color:var(--label2);transition:all .12s;}
.chip.on{border-color:var(--label);background:var(--label);color:#fff;}
.del-btn{width:100%;border:1px solid var(--sep2);border-radius:var(--rs);padding:10px;font-size:13px;color:var(--red);background:transparent;margin-top:8px;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.del-btn:hover{background:var(--red-bg);}
.confirm-btn{width:100%;border:none;border-radius:var(--rs);padding:12px;font-size:14px;font-weight:600;background:var(--label);color:#fff;margin-top:16px;cursor:pointer;transition:opacity .12s;}
.confirm-btn:hover{opacity:.85;}

/* ── RESULT ── */
.stat-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-box{background:var(--fill2);border:1px solid var(--sep);border-radius:var(--rm);padding:16px 12px;text-align:center;min-width:0;}
.stat-lbl{font-size:11px;color:var(--label2);font-weight:500;margin-bottom:6px;white-space:nowrap;}
.stat-val{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard{border:1px solid var(--sep);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.phd{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--sep);background:var(--fill2);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue-txt);flex-shrink:0;}
.pname-col{flex:1;}
.pname{font-size:14px;font-weight:600;}
.pnet{font-size:11px;margin-top:2px;}
.pnet.pos{color:var(--green);}
.pnet.neg{color:var(--red);}
.pnet.zero{color:var(--label3);}
.ptotal{font-size:17px;font-weight:700;}
.bd-row{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--sep);gap:8px;}
.bd-row:last-child{border-bottom:none;}
.bd-name{font-size:13px;flex:1;color:var(--label2);display:flex;align-items:center;gap:6px;min-width:0;}
.bd-name-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bd-ptag{font-size:11px;color:var(--label3);white-space:nowrap;}
.bd-share{font-size:13px;font-weight:600;}
.bd-ex-tag{font-size:10px;color:var(--blue-txt);background:var(--blue-bg);border-radius:4px;padding:1px 5px;font-weight:500;flex-shrink:0;}

/* ── SETTLE ── */
.right-body.settle-mode{background:var(--bg);}
.settle-hero{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);padding:28px 20px;margin-bottom:14px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.sh-eye{font-size:11px;font-weight:600;color:var(--label3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:8px;}
.sh-num{font-size:36px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.sh-sub{font-size:13px;color:var(--label2);}
.txn-card{background:var(--card);border:1px solid var(--sep);border-radius:var(--r);overflow:hidden;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.txn-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:12px;}
.txn-row:last-child{border-bottom:none;}
.txn-people{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.txn-from{font-size:14px;font-weight:600;color:var(--label);}
.txn-arr{color:var(--label);display:flex;align-items:center;}
.txn-to{font-size:14px;font-weight:600;color:var(--label);}
.txn-amt{font-size:15px;font-weight:700;text-align:right;flex-shrink:0;}
.pay-section-title{font-size:11px;font-weight:600;color:var(--label2);letter-spacing:.3px;text-transform:uppercase;margin-top:18px;margin-bottom:8px;padding:0 2px;}
.pay-section-title:first-child{margin-top:0;}
.pay-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:10px;}
.pay-row:last-child{border-bottom:none;}
.pay-name-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.pay-name{font-size:14px;font-weight:500;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pay-amt{font-size:14px;font-weight:600;text-align:right;flex-shrink:0;}
.adj-chip{font-size:10px;color:var(--blue-txt);background:var(--blue-bg);border:none;border-radius:4px;padding:2px 6px;font-weight:500;flex-shrink:0;font-family:inherit;cursor:pointer;transition:background .1s;}
.adj-chip:hover{background:#D9E9FF;}
.rounder-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:6px;z-index:200;min-width:160px;max-width:240px;}
/* 그룹 매니저 */
.group-switcher{display:inline-flex;align-items:center;gap:6px;background:var(--fill);border:1px solid var(--sep);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;color:var(--label);cursor:pointer;font-family:inherit;max-width:100%;}
.group-switcher:hover{background:var(--fill2);border-color:var(--sep2);}
.group-switcher-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
.group-switcher-arrow{color:var(--label3);font-size:10px;flex-shrink:0;}
.data-menu-btn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--sep);background:var(--fill);border-radius:8px;color:var(--label2);cursor:pointer;padding:0;flex-shrink:0;font-family:inherit;}
.data-menu-btn:hover{background:var(--fill2);color:var(--label);}
.group-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.18);padding:8px;z-index:200;min-width:300px;max-width:360px;}
.group-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:6px 8px 8px;}
.group-list{display:flex;flex-direction:column;gap:4px;max-height:380px;overflow-y:auto;}
/* 그룹 카드 */
.group-card{display:flex;align-items:stretch;border:1px solid var(--sep);border-radius:10px;overflow:hidden;background:var(--card);transition:all .12s;}
.group-card:hover{border-color:var(--sep2);background:var(--fill2);}
.group-card.on{border-color:var(--blue);background:var(--blue-bg);}
.group-card-main{flex:1;min-width:0;display:flex;align-items:center;gap:10px;padding:12px;border:none;background:transparent;cursor:pointer;font-family:inherit;text-align:left;}
.group-card-dot{width:8px;height:8px;border-radius:50%;background:var(--sep2);flex-shrink:0;}
.group-card.on .group-card-dot{background:var(--blue);}
.group-card-info{flex:1;min-width:0;}
.group-card-name{font-size:14px;font-weight:600;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-card.on .group-card-name{color:var(--blue-txt);}
.group-card-meta{font-size:11px;color:var(--label3);margin-top:3px;display:flex;align-items:center;gap:4px;}
.group-card-people{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.group-card-date{flex-shrink:0;}
.group-card-amt{font-size:13px;font-weight:700;color:var(--label2);flex-shrink:0;margin-left:8px;}
.group-card.on .group-card-amt{color:var(--blue-txt);}
.group-card-acts{display:flex;flex-direction:column;justify-content:center;border-left:1px solid var(--sep);background:rgba(255,255,255,.4);padding:4px;}
.group-card.on .group-card-acts{border-left-color:rgba(0,113,227,.2);}
.group-card-act{border:none;background:transparent;color:var(--label3);cursor:pointer;padding:5px 8px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;}
.group-card-act:hover{background:var(--card);color:var(--label);}
.group-add{display:block;width:100%;text-align:center;border:1px dashed var(--sep2);background:transparent;padding:12px;font-size:13px;cursor:pointer;border-radius:10px;color:var(--green);font-family:inherit;font-weight:600;margin-top:6px;}
.group-add:hover{background:var(--green-bg);border-color:var(--green);}
/* 데이터 메뉴 */
.data-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.15);padding:6px;z-index:200;min-width:220px;}
.data-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:8px 8px 6px;}
.data-pop-btn{display:flex;width:100%;text-align:left;align-items:center;border:none;background:transparent;padding:10px 10px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--label);font-family:inherit;}
.data-pop-btn:hover{background:var(--fill);}
.data-pop-btn.danger{color:var(--red);}
.data-pop-btn.danger:hover{background:var(--red-bg);}
.data-pop-divider{height:1px;background:var(--sep);margin:4px 4px;}
.rounder-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:6px 8px 4px;}
.rounder-opt{display:block;width:100%;text-align:left;border:none;background:transparent;padding:8px 10px;font-size:13px;cursor:pointer;border-radius:6px;color:var(--label);font-family:inherit;}
.rounder-opt:hover{background:var(--fill);}
.rounder-opt.on{color:var(--blue);font-weight:600;}
.pay-ic{cursor:pointer;border:none;font-family:inherit;padding:0;}
.pay-ic:hover{box-shadow:0 0 0 2px var(--blue-bg);}
.icon-pop{position:absolute;background:var(--card);border:1px solid var(--sep);border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.12);padding:8px;z-index:200;}
.icon-pop-hd{font-size:11px;font-weight:600;color:var(--label3);text-transform:uppercase;padding:4px 6px 8px;}
.icon-grid{display:grid;grid-template-columns:repeat(5,36px);gap:4px;}
.icon-opt{width:36px;height:36px;border:1px solid var(--sep);background:var(--card);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--blue-txt);transition:all .12s;padding:0;font-family:inherit;font-size:11px;}
.icon-opt:hover{background:var(--fill);}
.icon-opt.on{background:var(--blue-bg);border-color:var(--blue-txt);color:var(--blue-txt);font-weight:600;}
.detail-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--sep);gap:12px;cursor:pointer;transition:background .12s;}
.detail-row:hover{background:var(--fill2);}
.detail-row:last-child{border-bottom:none;}
.detail-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.detail-main{display:flex;align-items:center;gap:8px;min-width:0;}
.detail-name{font-size:14px;font-weight:500;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.detail-sub{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--label3);min-width:0;}
.detail-payer{white-space:nowrap;flex-shrink:0;}
.detail-sep{flex-shrink:0;}
.detail-members{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.detail-amt{font-size:15px;font-weight:700;flex-shrink:0;}
.pay-ic{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);color:var(--blue-txt);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.share-date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:0 4px;flex-wrap:wrap;}
.share-date-inp{font-size:13px;padding:6px 10px;border:1px solid var(--sep2);border-radius:8px;background:var(--card);color:var(--label);font-family:inherit;outline:none;cursor:pointer;}
.share-date-inp:hover{border-color:var(--label3);}
.share-date-inp:focus{border-color:var(--blue);}
.share-date-sep{color:var(--label3);font-size:13px;}
.share-date-add{font-size:12px;padding:6px 10px;border:1px dashed var(--sep2);border-radius:8px;background:transparent;color:var(--label2);cursor:pointer;font-family:inherit;}
.share-date-add:hover{border-color:var(--blue);color:var(--blue);}
.share-date-rm{width:24px;height:24px;border-radius:50%;border:none;background:var(--fill);color:var(--label3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;}
.share-date-rm:hover{background:var(--red-bg);color:var(--red);}
.share-actions{margin-top:20px;}
.share-save-btn{width:100%;border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:600;background:var(--label);color:#fff;cursor:pointer;transition:opacity .12s;display:flex;align-items:center;justify-content:center;gap:8px;}
.share-save-btn:hover{opacity:.88;}
.share-save-btn:active{transform:scale(.99);}
.notice{font-size:11px;color:var(--label3);text-align:center;margin-top:12px;line-height:1.6;}
.empty{text-align:center;padding:64px 20px;color:var(--label3);}
.empty-icon{margin-bottom:12px;display:flex;justify-content:center;color:var(--label3);}
.empty p{font-size:14px;line-height:1.7;}
.empty-sm{text-align:center;padding:24px 16px;color:var(--label3);font-size:13px;line-height:1.6;}
</style>
</head>
<body>

<div class="desktop-shell">
<div class="desktop-app">
  <div class="left" id="dLeft">
    <div class="left-top">

        <div class="pin-hint">쉼표(,)로 구분하면 여러 명을 한 번에 추가할 수 있어요</div>

      <div class="ilist-label-row" id="dItemTools" style="display:none">
        <input type="search" class="ilist-search" id="dItemSearch" placeholder="검색" oninput="setItemSearch(this.value)" />
        <select class="ilist-sort" onchange="setItemSort(this.value)" id="dItemSort">

    <div class="left-foot">

        <span class="foot-lbl">합계</span>

    </div>
  </div>
  <div class="right">
    <div class="right-top">
      <div class="r-eye" id="dREye">시작하기</div>
      <div class="r-title" id="dRTitle">참여자와 지출을 추가해보세요</div>
      <div class="r-sub" id="dRSub">왼쪽에서 참여자를 입력하고 지출을 추가하면 정산을 시작할 수 있어요.</div>
    </div>
    <div class="right-body" id="dRBody">
      <div class="empty"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="11" y2="16"/></svg></div><p>지출을 선택하거나 추가하면<br>여기서 편집할 수 있어요</p></div>
    </div>
  </div>
</div>

  <div class="mob-header">
    <div class="mob-title-row">
      <span class="mob-title">더치페이</span>

    </div>

      <button class="group-switcher" onclick="showGroupManager(this,event)" title="그룹 관리"><span class="group-switcher-name">기본 정산</span><span class="group-switcher-arrow">▼</span></button>
      <button class="data-menu-btn" onclick="showDataMenu(this,event)" title="데이터 관리"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg></button>
    </div>
    <div class="mob-tabs">
      <button class="mob-tab on" id="mTInput" onclick="mSetTab('input')">입력</button>

<script>
// ── SHARED STATE ──
// 현재 활성 그룹의 데이터를 글로벌 변수로 보관 (모든 render/mutator는 이걸 직접 사용)
let people=[],items=[],idc=0,selectedId=null;
let dTab='input',mTab='input';
let itemSort='default'; // default | amtDesc | amtAsc | nameAsc
let itemSearch='';
let settleDateStart=new Date().toISOString().slice(0,10);
let settleDateEnd=null;

// 그룹 시스템
let groups=[]; // [{id, name, data:{people,items,idc,settleDateStart,settleDateEnd,itemSort,itemSearch}}]
let currentGroupId=null;
function _emptyGroupData(){return{people:[],items:[],idc:0,settleDateStart:new Date().toISOString().slice(0,10),settleDateEnd:null,itemSort:'default',itemSearch:''};}
// 자동 그룹 이름: 참여자명 join
function _autoGroupName(peopleArr){
  if(!peopleArr||!peopleArr.length)return '모임명 또는 참여자';
  return peopleArr.join(', ');
}
// 현재 그룹이 자동 이름 모드면 참여자 기반으로 이름 갱신
// nameAuto가 명시적으로 true일 때만 동작 (기존 그룹·undefined는 수동으로 간주)
function _updateAutoNameIfNeeded(){
  const g=getCurrentGroup();
  if(!g||!g.nameAuto)return;
  g.name=_autoGroupName(people);
}
function _newGroupId(){return 'g'+Date.now()+Math.floor(Math.random()*1000);}
function getCurrentGroup(){return groups.find(g=>g.id===currentGroupId);}
function syncCurrentToGroup(){
  const g=getCurrentGroup();
  if(!g)return;
  g.data={
    people:people.slice(),
    items:JSON.parse(JSON.stringify(items)),
    idc,settleDateStart,settleDateEnd,itemSort,itemSearch
  };
}
function loadGroupData(g){
  people=(g.data.people||[]).slice();
  items=JSON.parse(JSON.stringify(g.data.items||[]));
  idc=g.data.idc||0;
  settleDateStart=g.data.settleDateStart||new Date().toISOString().slice(0,10);
  settleDateEnd=g.data.settleDateEnd!==undefined?g.data.settleDateEnd:null;
  itemSort=g.data.itemSort||'default';
  itemSearch=g.data.itemSearch||'';
  selectedId=null;
}
function switchGroup(id){
  if(id===currentGroupId)return;
  syncCurrentToGroup();
  currentGroupId=id;
  const g=getCurrentGroup();
  if(g)loadGroupData(g);
  renderAll();
}
function createGroup(name){
  const id=_newGroupId();
  syncCurrentToGroup();
  const trimmed=(name||'').trim();
  // 사용자가 명시적으로 이름 입력 → nameAuto=false (수동 모드)
  // 빈 이름이면 nameAuto=true (참여자 따라 자동 갱신)
  const isAuto=!trimmed;
  groups.push({id,name:trimmed||_autoGroupName([]),nameAuto:isAuto,data:_emptyGroupData()});
  currentGroupId=id;
  loadGroupData(groups[groups.length-1]);
  renderAll();
  toast(trimmed?`'${trimmed}' 그룹 생성됨`:'새 그룹이 생성됐어요',{type:'success'});
}
function renameGroup(id,newName){
  const g=groups.find(g=>g.id===id);
  if(!g)return;
  const trimmed=(newName||'').trim();
  if(!trimmed)return;
  g.name=trimmed;
  g.nameAuto=false; // 사용자가 직접 이름 지정 → 자동 갱신 해제
  saveState();
  renderAll();
}
function duplicateGroup(id){
  const g=groups.find(g=>g.id===id);
  if(!g)return;
  syncCurrentToGroup();
  const newId=_newGroupId();
  const newGroup={
    id:newId,
    name:g.name+' (복사)',
    nameAuto:false, // 복제는 명시적 이름 유지
    data:{
      // 참여자만 복사, 지출/날짜는 새로 시작
      people:(g.data.people||[]).slice(),
      items:[],
      idc:0,
      settleDateStart:new Date().toISOString().slice(0,10),
      settleDateEnd:null,
      itemSort:'default',
      itemSearch:'',
    }
  };
  groups.push(newGroup);
  currentGroupId=newId;
  loadGroupData(newGroup);
  renderAll();
  toast(`'${newGroup.name}' 생성됨 (참여자 ${newGroup.data.people.length}명 복사)`,{type:'success'});
}

function deleteGroup(id){
  if(groups.length<=1){toast('마지막 그룹은 삭제할 수 없어요',{type:'error'});return;}
  const idx=groups.findIndex(g=>g.id===id);
  if(idx<0)return;
  const snap={group:JSON.parse(JSON.stringify(groups[idx])),idx,wasCurrent:id===currentGroupId};
  groups.splice(idx,1);
  if(snap.wasCurrent){
    currentGroupId=groups[0].id;
    loadGroupData(groups[0]);
  }
  renderAll();
  toast(`'${snap.group.name}' 그룹 삭제됨`,{action:()=>{
    groups.splice(snap.idx,0,snap.group);
    if(snap.wasCurrent){
      syncCurrentToGroup();
      currentGroupId=snap.group.id;
      loadGroupData(snap.group);
    }
    renderAll();
  },actionLabel:'되돌리기'});
}

// ── 그룹 매니저 popover ──
// 그룹별 요약 정보 (총액, 참여자, 일자)
function _groupSummary(g){
  // 현재 그룹은 라이브 globals 사용 (실시간 반영)
  const isCurrent=g.id===currentGroupId;
  const data=isCurrent?{people,items,settleDateStart,settleDateEnd}:g.data||{};
  const peopleArr=data.people||[];
  const itemsArr=data.items||[];
  const total=itemsArr.reduce((s,it)=>s+(+it.amount||0),0);
  let dateText='';
  if(data.settleDateStart){
    const fmtD=(iso)=>iso?iso.slice(5).replace('-','.'):'';
    if(data.settleDateEnd&&data.settleDateEnd!==data.settleDateStart){
      dateText=fmtD(data.settleDateStart)+'~'+fmtD(data.settleDateEnd);
    }else{
      dateText=data.settleDateStart.slice(2).replace(/-/g,'.');
    }
  }
  return{
    total,
    totalText:total?fmt(total)+'원':'—',
    peopleText:peopleArr.length?peopleArr.join(' · '):'참여자 없음',
    peopleCount:peopleArr.length,
    dateText
  };
}

function showGroupManager(anchorEl,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  document.querySelectorAll('.icon-pop,.rounder-pop,.group-pop,.data-pop').forEach(el=>el.remove());
  const pop=document.createElement('div');
  pop.className='group-pop';
  const cardsHtml=groups.map(g=>{
    const s=_groupSummary(g);
    const on=g.id===currentGroupId;
    return `<div class="group-card${on?' on':''}">
      <button class="group-card-main" data-action="switch" data-id="${e(g.id)}">
        <span class="group-card-dot"></span>
        <span class="group-card-info">
          <span class="group-card-name">${e(g.name)}</span>
          <span class="group-card-meta">
            <span class="group-card-people">${e(s.peopleText)}</span>
            ${s.dateText?`<span class="group-card-date">${e(s.dateText)}</span>`:''}
          </span>
        </span>
        <span class="group-card-amt">${s.totalText}</span>
      </button>
      <div class="group-card-acts">
        <button class="group-card-act" data-action="duplicate" data-id="${e(g.id)}" title="참여자 복사해 새 그룹 만들기">${svgCopy}</button>
        <button class="group-card-act" data-action="rename" data-id="${e(g.id)}" title="이름 변경">${svgPencil}</button>
        ${groups.length>1?`<button class="group-card-act" data-action="delete" data-id="${e(g.id)}" title="삭제">${svgTrash}</button>`:''}
      </div>
    </div>`;
  }).join('');
  pop.innerHTML=`<div class="group-pop-hd">정산 그룹</div>
    <div class="group-list">${cardsHtml}</div>
    <button class="group-add" data-action="add">＋ 새 그룹</button>`;
  pop.addEventListener('click',(e2)=>{
    e2.stopPropagation();
    const btn=e2.target.closest('[data-action]');
    if(!btn)return;
    const action=btn.dataset.action;
    const id=btn.dataset.id;
    if(action==='switch'){switchGroup(id);pop.remove();}
    else if(action==='rename'){
      const g=groups.find(g=>g.id===id);
      const newName=prompt('새 이름:',g?g.name:'');
      if(newName&&newName.trim())renameGroup(id,newName);
      pop.remove();
    }else if(action==='delete'){
      const g=groups.find(g=>g.id===id);
      if(g&&confirm(`'${g.name}' 그룹을 삭제할까요?\n참여자·지출 모두 사라집니다. (되돌리기 가능)`)){
        deleteGroup(id);
      }
      pop.remove();
    }else if(action==='add'){
      const name=prompt('새 그룹 이름:','');
      if(name&&name.trim())createGroup(name.trim());
      pop.remove();
    }else if(action==='duplicate'){
      duplicateGroup(id);pop.remove();
    }
  });
  document.body.appendChild(pop);
  _positionPopover(pop,anchorEl);
  setTimeout(()=>{
    const h=(e3)=>{if(!pop.contains(e3.target)){pop.remove();document.removeEventListener('click',h);document.removeEventListener('keydown',k);}};
    const k=(e3)=>{if(e3.key==='Escape'){pop.remove();document.removeEventListener('click',h);document.removeEventListener('keydown',k);}};
    document.addEventListener('click',h);
    document.addEventListener('keydown',k);
  },0);
}

// 공통: popover 위치 계산 (모바일은 좌우 12px 균등 여백)
function _positionPopover(pop,anchorEl,rightAlign){
  const r=anchorEl.getBoundingClientRect();
  pop.style.top=(r.bottom+window.scrollY+6)+'px';
  const isMobile=window.innerWidth<700;
  if(isMobile){
    // 모바일: 좌우 동일 여백, 화면 폭 채움
    pop.style.left='12px';
    pop.style.right='12px';
    pop.style.width='auto';
    pop.style.maxWidth='none';
  }else{
    // 데스크톱: 앵커 기준 정렬 + 오버플로 보정
    pop.style.right='auto';
    pop.style.width='auto';
    const pr=pop.getBoundingClientRect();
    let left;
    if(rightAlign){
      left=r.right-pr.width+window.scrollX;
    }else{
      left=r.left+window.scrollX;
    }
    if(left+pr.width>window.innerWidth-8)left=window.innerWidth-pr.width-8;
    pop.style.left=Math.max(8,left)+'px';
  }
}

function exportCurrentGroupCsv(){
  const g=getCurrentGroup();
  if(!g){toast('내보낼 데이터가 없어요',{type:'error'});return;}
  syncCurrentToGroup();
  if(!items.length){toast('지출이 없는 그룹이에요',{type:'error'});return;}
  // BOM (한글 깨짐 방지 — Excel/구글시트 호환)
  const BOM='﻿';
  const esc=(s)=>{
    s=String(s==null?'':s);
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  };
  const lines=[];
  // 헤더 정보
  lines.push(`그룹,${esc(g.name)}`);
  if(settleDateStart){
    if(settleDateEnd&&settleDateEnd!==settleDateStart){
      lines.push(`기간,${settleDateStart} ~ ${settleDateEnd}`);
    }else{
      lines.push(`일자,${settleDateStart}`);
    }
  }
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);
  lines.push(`총 금액,${total}`);
  lines.push(`참여자,${esc(people.join(', '))}`);
  lines.push('');
  // 지출 내역
  lines.push('# 지출 내역');
  lines.push('번호,지출 이름,금액,결제자,참여자');
  items.forEach((it,i)=>{
    const mems=(it.members.length?it.members:people).join(', ');
    lines.push([i+1,esc(it.name||'(이름 없음)'),+it.amount||0,esc(it.payer||''),esc(mems)].join(','));
  });
  lines.push('');
  // 송금 내역
  const{paid,owes}=computeShares();
  const txns=calcTxns(paid,owes);
  if(txns.length){
    lines.push('# 송금 내역');
    lines.push('보내는 사람,받는 사람,금액');
    txns.forEach(t=>{lines.push([esc(t.from),esc(t.to),t.amt].join(','));});
    lines.push('');
  }
  // 개인별 정산
  lines.push('# 개인별 정산');
  lines.push('이름,결제 총액,분담 총액,순액(받을:+/낼:−)');
  people.forEach(p=>{
    const paidP=paid[p]||0,owesP=owes[p]||0,net=paidP-owesP;
    lines.push([esc(p),paidP,owesP,net].join(','));
  });
  const csv=BOM+lines.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  const safeName=g.name.replace(/[\\\/:*?"<>|]/g,'_');
  a.download=`더치페이_${safeName}_${date}.csv`;
  a.href=url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('엑셀(CSV) 파일이 다운로드됐어요',{type:'success'});
}

function importData(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='application/json,.json';
  inp.onchange=()=>{
    const file=inp.files&&inp.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const d=JSON.parse(reader.result);
        if(!d||!Array.isArray(d.groups)||!d.groups.length){
          toast('올바른 백업 파일이 아니에요',{type:'error'});return;
        }
        if(!confirm(`백업의 ${d.groups.length}개 그룹을 현재 데이터에 ${groups.length>0?'추가':'복원'}할까요?\n("취소"로 안전하게 종료 가능)`))return;
        // 기존 그룹 + 새 그룹 (id 충돌 방지)
        const existingIds=new Set(groups.map(g=>g.id));
        let added=0;
        d.groups.forEach(g=>{
          let newId=g.id;
          while(existingIds.has(newId))newId=_newGroupId();
          existingIds.add(newId);
          groups.push({id:newId,name:g.name||'복원된 그룹',data:Object.assign(_emptyGroupData(),g.data||{})});
          added++;
        });
        saveState();
        renderAll();
        toast(`${added}개 그룹 가져오기 완료`,{type:'success'});
      }catch(e){
        toast('백업 파일을 읽을 수 없어요',{type:'error'});
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function getDisplayItems(){
  let arr=items.slice();
  if(itemSearch.trim()){
    const q=itemSearch.trim().toLowerCase();
    arr=arr.filter(it=>(it.name||'').toLowerCase().includes(q));
  }
  if(itemSort==='amtDesc')arr.sort((a,b)=>(+b.amount||0)-(+a.amount||0));
  else if(itemSort==='amtAsc')arr.sort((a,b)=>(+a.amount||0)-(+b.amount||0));
  else if(itemSort==='nameAsc')arr.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  return arr;
}

// ── TOAST 알림 시스템 ──
let _toastContainer=null;
function _getToastContainer(){
  if(!_toastContainer||!document.body.contains(_toastContainer)){
    _toastContainer=document.createElement('div');
    _toastContainer.className='toast-container';
    document.body.appendChild(_toastContainer);
  }
  return _toastContainer;
}
function toast(msg,opts){
  opts=opts||{};
  const container=_getToastContainer();
  const t=document.createElement('div');
  t.className='toast'+(opts.type?' '+opts.type:'');
  const span=document.createElement('span');
  span.className='toast-msg';
  span.textContent=msg;
  t.appendChild(span);
  let timer=null;
  const dismiss=()=>{
    if(timer){clearTimeout(timer);timer=null;}
    t.classList.remove('show');
    setTimeout(()=>{if(t.parentNode)t.remove();},250);
  };
  if(opts.action&&opts.actionLabel){
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='toast-action';
    btn.textContent=opts.actionLabel;
    btn.addEventListener('click',()=>{opts.action();dismiss();});
    t.appendChild(btn);
  }
  container.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  const duration=opts.duration||(opts.action?5000:2500);
  timer=setTimeout(dismiss,duration);
  return{dismiss};
}

// ── 인앱 브라우저 감지 (카톡·네이버·라인 등은 Web Share API 파일 공유 미지원) ──
function detectInAppBrowser(){
  const ua=navigator.userAgent||'';
  if(/KAKAOTALK/i.test(ua))return {name:'카카오톡',scheme:'kakaotalk://web/openExternal?url='};
  if(/NAVER\(inapp/i.test(ua))return {name:'네이버',scheme:null};
  if(/Line\//i.test(ua))return {name:'Line',scheme:'line://nv/openExternalBrowser/?url='};
  if(/Instagram/i.test(ua))return {name:'Instagram',scheme:null};
  if(/FBAN|FBAV/i.test(ua))return {name:'Facebook',scheme:null};
  return null;
}
function openInExternalBrowser(){
  const t=detectInAppBrowser();
  const url=location.href;
  if(t&&t.scheme){
    window.location.href=t.scheme+encodeURIComponent(url);
  }else{
    alert('우측 상단 ⋮ 메뉴에서 "다른 브라우저로 열기"를 눌러주세요.');
  }
}

// ── PERSISTENCE (localStorage) ──
const STORAGE_KEY='dutchpay_v1'; // 키는 유지, 내부 version 필드로 구분
function saveState(){
  try{
    syncCurrentToGroup();
    localStorage.setItem(STORAGE_KEY,JSON.stringify({
      version:2,
      groups,
      currentGroupId,
    }));
  }catch(e){/* private mode 등 무시 */}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw){
      // 새 사용자 — 첫 그룹 생성 (참여자 추가 시 자동 이름 갱신)
      const id=_newGroupId();
      groups=[{id,name:'모임명 또는 참여자',nameAuto:true,data:_emptyGroupData()}];
      currentGroupId=id;
      loadGroupData(groups[0]);
      return;
    }
    const d=JSON.parse(raw);
    if(d.version===2&&Array.isArray(d.groups)&&d.groups.length){
      groups=d.groups;
      currentGroupId=d.currentGroupId||groups[0].id;
      const g=getCurrentGroup()||groups[0];
      currentGroupId=g.id;
      loadGroupData(g);
    }else{
      // v1 마이그레이션 — 기존 데이터를 첫 그룹으로 (참여자 있으면 자동 이름)
      const id=_newGroupId();
      const v1People=Array.isArray(d.people)?d.people:[];
      groups=[{id,name:v1People.length?_autoGroupName(v1People):'모임명 또는 참여자',nameAuto:true,data:{
        people:v1People,
        items:Array.isArray(d.items)?d.items:[],
        idc:typeof d.idc==='number'?d.idc:0,
        settleDateStart:d.settleDateStart||new Date().toISOString().slice(0,10),
        settleDateEnd:d.settleDateEnd!==undefined?d.settleDateEnd:null,
        itemSort:'default',itemSearch:'',
      }}];
      currentGroupId=id;
      loadGroupData(groups[0]);
    }
  }catch(e){
    // 파싱 실패 — 빈 그룹으로 시작
    const id=_newGroupId();
    groups=[{id,name:'모임명 또는 참여자',nameAuto:true,data:_emptyGroupData()}];
    currentGroupId=id;
    loadGroupData(groups[0]);
  }
}
function resetAllData(){
  if(!confirm('모든 그룹의 데이터를 초기화할까요?\n모든 참여자·지출이 사라지고 기본 그룹만 남습니다.'))return;
  const id=_newGroupId();
  groups=[{id,name:'모임명 또는 참여자',nameAuto:true,data:_emptyGroupData()}];
  currentGroupId=id;
  loadGroupData(groups[0]);
  saveState();

}

const ICON_BY_KEY={food:svgFood,cafe:svgCafe,beer:svgBeer,mic:svgMic,car:svgCar,shop:svgShop,movie:svgMovie,bed:svgBed,cake:svgCake,receipt:svgReceipt};

function getIconSvg(itemOrName){
  let name,override;
  if(typeof itemOrName==='string'){name=itemOrName;}
  else if(itemOrName){name=itemOrName.name;override=itemOrName.iconOverride;}
  if(override&&ICON_BY_KEY[override])return ICON_BY_KEY[override];
  if(!name||!name.trim())return svgReceipt;
  for(const[svg,pat]of ICON_RULES){if(pat.test(name))return svg;}
  return svgFood; // 매칭 실패 시 식사 아이콘 (대부분 지출이 식사·술집이라 통계적 합리적 기본값)
}

// ── INPUT: DESKTOP ──
const dInp=document.getElementById('dPInp');
let dComposing=false;
dInp.addEventListener('compositionstart',()=>{dComposing=true;});
dInp.addEventListener('compositionend',()=>{dComposing=false;});
dInp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!dComposing&&!e.isComposing){e.preventDefault();dFlush();}
});
dInp.addEventListener('blur',()=>{
  setTimeout(()=>{if(!dComposing)dFlush();},0);
});
function dFlush(){
  const v=dInp.value;
  if(!v.trim())return;
  v.split(/[,，、]/).forEach(p=>addOneName(p));
  dInp.value='';
}

// ── INPUT: MOBILE (dynamically created, handled via delegation) ──
let mComposing=false;
function mSetupInput(){
  const inp=document.getElementById('mPInp');
  if(!inp)return;
  mComposing=false;
  inp.addEventListener('compositionstart',()=>{mComposing=true;});
  inp.addEventListener('compositionend',()=>{mComposing=false;});
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!mComposing&&!e.isComposing){e.preventDefault();mFlush();}
  });
  inp.addEventListener('blur',()=>{
    setTimeout(()=>{if(!mComposing)mFlush();},0);
  });
}
function mFlush(){
  const inp=document.getElementById('mPInp');
  if(!inp)return;
  const v=inp.value;
  if(!v.trim())return;
  v.split(/[,，、]/).forEach(p=>addOneName(p));
  inp.value='';
  renderAll();
}

// ── CORE ──
function addOneName(raw){
  const n=raw.trim();
  if(!n||people.includes(n))return;
  people.push(n);
  _updateAutoNameIfNeeded();
  renderAll();
}

function removePerson(name){
  const idx=people.indexOf(name);
  if(idx<0)return;
  // 스냅샷 (undo용)
  const snap={name,idx,items:items.map(it=>({id:it.id,members:[...it.members],payer:it.payer,rounderOverride:it.rounderOverride}))};
  people=people.filter(p=>p!==name);
  items.forEach(it=>{
    it.members=it.members.filter(m=>m!==name);
    if(it.payer===name)it.payer=people[0]||'';
    if(it.rounderOverride===name)it.rounderOverride=null;
  });
  _updateAutoNameIfNeeded();
  renderAll();
  toast(`'${name}' 삭제됨`,{action:()=>{
    people.splice(snap.idx,0,snap.name);
    snap.items.forEach(s=>{
      const it=items.find(i=>i.id===s.id);
      if(it){it.members=s.members;it.payer=s.payer;it.rounderOverride=s.rounderOverride;}
    });
    _updateAutoNameIfNeeded();
    renderAll();
  },actionLabel:'되돌리기'});
}

function clearAll(){
  if(!people.length)return;
  if(!confirm('참여자를 전체 삭제할까요?'))return;
  // 스냅샷 (undo용)
  const snap={people:[...people],items:items.map(it=>({id:it.id,members:[...it.members],payer:it.payer}))};
  people=[];
  items.forEach(it=>{it.members=[];it.payer='';});
  selectedId=null;
  _updateAutoNameIfNeeded();
  renderAll();
  toast('참여자 전체 삭제됨',{action:()=>{
    people=snap.people;
    snap.items.forEach(s=>{
      const it=items.find(i=>i.id===s.id);
      if(it){it.members=s.members;it.payer=s.payer;}
    });
    _updateAutoNameIfNeeded();
    renderAll();
  },actionLabel:'되돌리기'});
}

function clearAllItems(){
  if(!items.length)return;
  if(!confirm('지출을 전체 삭제할까요?'))return;
  const snap={items:JSON.parse(JSON.stringify(items)),idc};
  items=[];
  idc=0;
  selectedId=null;
  closeSheet();
  renderAll();
  toast(`지출 ${snap.items.length}개 삭제됨`,{action:()=>{
    items=snap.items;
    idc=snap.idc;
    renderAll();
  },actionLabel:'되돌리기'});
}

function setRounderOverride(itemId,value){
  const it=items.find(i=>i.id===itemId);
  if(!it)return;
  it.rounderOverride=value||null;
  saveState();
  renderAll();
}

function setIconOverride(itemId,key){
  const it=items.find(i=>i.id===itemId);

  it.iconOverride=key||null;
  saveState();
  renderAll();
}

function showIconPicker(itemId,anchorEl,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  document.querySelectorAll('.icon-pop,.rounder-pop').forEach(el=>el.remove());
  const it=items.find(i=>i.id===itemId);
  if(!it)return;
  const cur=it.iconOverride||'';
  const choices=[
    {k:'',label:'자동'},
    {k:'food',svg:svgFood},
    {k:'cafe',svg:svgCafe},
    {k:'beer',svg:svgBeer},
    {k:'cake',svg:svgCake},
    {k:'mic',svg:svgMic},
    {k:'car',svg:svgCar},
    {k:'shop',svg:svgShop},
    {k:'movie',svg:svgMovie},
    {k:'bed',svg:svgBed},
    {k:'receipt',svg:svgReceipt},
  ];
  const pop=document.createElement('div');
  pop.className='icon-pop';
  pop.innerHTML=`<div class="icon-pop-hd">아이콘 선택</div><div class="icon-grid">`+
    choices.map(o=>`<button class="icon-opt${cur===o.k?' on':''}" data-key="${o.k}" title="${o.label||o.k}">${o.svg||o.label}</button>`).join('')+
    `</div>`;
  pop.addEventListener('click',ev2=>{
    ev2.stopPropagation();
    const btn=ev2.target.closest('.icon-opt');
    if(!btn)return;
    setIconOverride(itemId,btn.dataset.key);
    pop.remove();
  });
  document.body.appendChild(pop);
  const r=anchorEl.getBoundingClientRect();
  pop.style.top=(r.bottom+window.scrollY+6)+'px';
  let left=r.left+window.scrollX;
  const pr=pop.getBoundingClientRect();
  if(left+pr.width>window.innerWidth-8)left=window.innerWidth-pr.width-8;
  pop.style.left=Math.max(8,left)+'px';
  setTimeout(()=>{
    const h=ev3=>{if(!pop.contains(ev3.target)){pop.remove();document.removeEventListener('click',h);document.removeEventListener('keydown',k);}};
    const k=ev3=>{if(ev3.key==='Escape'){pop.remove();document.removeEventListener('click',h);document.removeEventListener('keydown',k);}};
    document.addEventListener('click',h);
    document.addEventListener('keydown',k);
  },0);
}

function showRounderPicker(itemId,anchorEl,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  // 기존 popover 닫기
  document.querySelectorAll('.rounder-pop').forEach(el=>el.remove());
  const it=items.find(i=>i.id===itemId);
  if(!it)return;
  const memOpts=it.members.length?it.members:people;
  const cur=it.rounderOverride||'';
  const pop=document.createElement('div');
  pop.className='rounder-pop';
  const optsHtml=`<div class="rounder-pop-hd">차액 부담자</div>`+
    [{v:'',label:'자동 (결제자 우선)'}].concat(memOpts.map(p=>({v:p,label:e(p)+' 부담'})))
      .map(o=>`<button class="rounder-opt${cur===o.v?' on':''}" data-val="${ea(o.v)}">${o.label}</button>`).join('');
  pop.innerHTML=optsHtml;
  pop.addEventListener('click',ev2=>{
    ev2.stopPropagation();
    const btn=ev2.target.closest('.rounder-opt');
    if(!btn)return;
    setRounderOverride(itemId,btn.dataset.val);
    pop.remove();
  });
  document.body.appendChild(pop);
  // 위치 보정 (앵커 아래 + 오른쪽 정렬 가능 시)
  const r=anchorEl.getBoundingClientRect();
  pop.style.top=(r.bottom+window.scrollY+6)+'px';
  let left=r.left+window.scrollX;
  const pr=pop.getBoundingClientRect();
  if(left+pr.width>window.innerWidth-8)left=window.innerWidth-pr.width-8;
  pop.style.left=Math.max(8,left)+'px';
  // 외부 클릭 시 닫기
  setTimeout(()=>{
    const h=ev3=>{if(!pop.contains(ev3.target)){pop.remove();document.removeEventListener('click',h);document.removeEventListener('keydown',k);}};
    const k=ev3=>{if(ev3.key==='Escape'){pop.remove();document.removeEventListener('click',h);document.removeEventListener('keydown',k);}};
    document.addEventListener('click',h);
    document.addEventListener('keydown',k);
  },0);
}

function addItem(){
  const isMobile=window.matchMedia('(max-width:700px)').matches;
  if(!people.length){
    const inp=isMobile?document.getElementById('mPInp'):document.getElementById('dPInp');
    if(inp)inp.focus();
    return;
  }
  idc++;
  items.push({id:idc,name:'',amount:'',payer:people[0]||'',members:[...people]});
  selectedId=idc;
  renderAll();
  if(isMobile){
    openSheet(idc);
    setTimeout(()=>{const inp=document.getElementById('sfname');if(inp)inp.focus();},320);
  }else{
    setTimeout(()=>{const inp=document.getElementById('fname');if(inp)inp.focus();},60);
  }
}

function removeItem(id){
  const idx=items.findIndex(it=>it.id===id);
  if(idx<0)return;
  const snap={item:items[idx],idx};
  items=items.filter(it=>it.id!==id);
  if(selectedId===id)selectedId=null;
  closeSheet();
  renderAll();
  const name=snap.item.name||'(이름 없음)';
  toast(`'${name}' 삭제됨`,{action:()=>{
    items.splice(snap.idx,0,snap.item);
    renderAll();
  },actionLabel:'되돌리기'});
}

function selectItem(id){
  selectedId=id;
  if(dTab!=='input'){
    dTab='input';
    ['input','result','settle'].forEach(n=>{
      document.getElementById('dT'+cap(n)).className='tab'+(n==='input'?' on':'');
    });
  }
  renderAll();
}
function selectItemMob(id){
  selectedId=id;
  if(mTab!=='input'){
    mTab='input';
    ['input','result','settle'].forEach(n=>{
      document.getElementById('mT'+cap(n)).className='mob-tab'+(n==='input'?' on':'');
    });
    renderMobileBody();
  }
  openSheet(id);
}

function updateField(id,field,val){
  const it=items.find(i=>i.id===id);if(!it)return;
  it[field]=val;
  renderItemLists();
  refreshMobItems();
  updateTotals();
  if(field==='name'){
    document.getElementById('dREye').textContent='지출 편집';
    document.getElementById('dRTitle').textContent=val||'새 지출';
    const mst=document.getElementById('mSheetTitle');
    if(mst)mst.textContent=val||'새 지출';
  }
  saveState();
}

function toggleMember(id,name,btn){
  const it=items.find(i=>i.id===id);if(!it)return;
  if(it.members.includes(name)){if(it.members.length>1)it.members=it.members.filter(m=>m!==name);}
  else it.members.push(name);
  btn.className='chip'+(it.members.includes(name)?' on':'');
  renderItemLists();
  refreshMobItems();
  saveState();
}

function refreshMobItems(){
  const el=document.getElementById('mItemRows');
  if(!el)return;
  const list=getDisplayItems();
  if(!list.length){
    el.innerHTML=items.length?'<div class="ilist-results-empty">검색 결과가 없어요</div>':'';
    return;
  }
  el.innerHTML=list.map(it=>`<div class="mob-item-row${it.id===selectedId?' sel':''}" onclick="selectItemMob(${it.id})">
    <div class="mob-item-dot"></div>
    <div class="mob-item-info"><div class="mob-item-name">${e(it.name)||'(이름 없음)'}</div><div class="mob-item-meta">${e(it.payer)||'결제자 미정'} · ${it.members.length}명</div></div>
    <div class="mob-item-amt${+it.amount<0?' amt-neg':''}">${it.amount?fmt(+it.amount)+'원':'-'}</div>
  </div>`).join('');
}

// ── COMPUTE ──
function computeShares(){
  // 총액 기준 정산: 각 지출의 분담금은 실수로 누적하고, 마지막에 한 번만 반올림.
  // 차액은 largest-remainder 방식으로 분배 (가장 큰 소수부터 +1, 동률이면 결제자 우선).
  // it.rounderOverride가 설정되어 있으면 해당 지출은 per-item으로 정수 분배 (지정인이 차액 부담).
  const paid={},owes={},details={};
  const owesFloat={};
  people.forEach(p=>{paid[p]=0;owes[p]=0;details[p]=[];owesFloat[p]=0;});
  const payerSet={};
  items.forEach(it=>{
    if(!it.amount||+it.amount===0)return;
    const amt=+it.amount,mems=it.members.length?it.members:[...people],n=mems.length;
    paid[it.payer]=(paid[it.payer]||0)+amt;
    if(it.payer)payerSet[it.payer]=true;
    const override=it.rounderOverride;
    if(override&&mems.includes(override)){
      // 직접 지정: 차액 전체를 override가 부담
      const base=Math.floor(amt/n),rem=amt-base*n;
      mems.forEach(p=>{
        const share=p===override?base+rem:base;
        owesFloat[p]=(owesFloat[p]||0)+share;
        details[p].push({name:it.name||'(이름 없음)',payer:it.payer,share,extra:p===override&&rem>0});
      });
    }else{
      // 자동: 실수 분담금 누적 (마지막에 largest-remainder)
      const exact=amt/n;
      mems.forEach(p=>{
        owesFloat[p]=(owesFloat[p]||0)+exact;
        details[p].push({name:it.name||'(이름 없음)',payer:it.payer,share:exact,extra:false});
      });
    }
  });
  const totalAmt=items.reduce((s,it)=>s+(+it.amount||0),0);
  let totalFloor=0;
  const fracParts=[];
  people.forEach(p=>{
    const f=owesFloat[p]||0;
    const fl=Math.floor(f);
    owes[p]=fl;
    totalFloor+=fl;
    fracParts.push({p,frac:f-fl});
  });
  let diff=Math.round(totalAmt-totalFloor);
  if(diff!==0){
    // 차액 전체를 한 명에게 몰기 (결제자 우선, 동률이면 소수부 큰 순)
    fracParts.sort((a,b)=>{
      const ap=payerSet[a.p]?1:0,bp=payerSet[b.p]?1:0;
      if(ap!==bp)return bp-ap; // 결제자 먼저
      return b.frac-a.frac;     // 그 다음 소수부 큰 순
    });
    if(fracParts.length)owes[fracParts[0].p]+=diff;
  }
  return{paid,owes,details,hasRounding:diff!==0};
}

function calcTxns(paid,owes){
  const bal={};people.forEach(p=>{bal[p]=(paid[p]||0)-(owes[p]||0);});
  const creds=[],debts=[];
  Object.entries(bal).forEach(([p,b])=>{if(b>0.5)creds.push({p,b});else if(b<-0.5)debts.push({p,b:-b});});
  creds.sort((a,z)=>z.b-a.b);debts.sort((a,z)=>z.b-a.b);
  const txns=[],cs=creds.map(c=>({...c})),ds=debts.map(d=>({...d}));
  let ci=0,di=0;
  while(ci<cs.length&&di<ds.length){
    const c=cs[ci],d=ds[di],amt=Math.min(c.b,d.b);
    if(amt>0.5)txns.push({from:d.p,to:c.p,amt:Math.round(amt)});
    c.b-=amt;d.b-=amt;
    if(c.b<0.5)ci++;if(d.b<0.5)di++;
  }
  return txns;
}

function personCardHtml(p,paid,owes,details){
  const bd=details[p]||[],owed=owes[p]||0,ppaid=paid[p]||0,net=ppaid-owed;
  const netTxt=net>0?`+${fmt(net)}원 받을 예정`:net<0?`${fmt(-net)}원 낼 예정`:'정산 완료';
  const netCls=net>0?'pos':net<0?'neg':'zero';
  const rows=bd.map(b=>`<div class="bd-row"><span class="bd-name"><span class="bd-name-txt">${e(b.name)}</span>${b.extra?'<span class="bd-ex-tag" title="1원 차액 포함">+1원</span>':''}</span><span class="bd-ptag">${e(b.payer)} 결제</span><span class="bd-share">${fmt(b.share)}원</span></div>`).join('');
  return `<div class="pcard"><div class="phd"><div class="avatar">${e(p.slice(0,1))}</div><div class="pname-col"><div class="pname">${e(p)}</div><div class="pnet ${netCls}">${netTxt}</div></div><div class="ptotal">${fmt(owed)}원</div></div>${rows}<div class="bd-row" style="background:var(--fill2)"><span class="bd-name" style="color:var(--label3)"><span class="bd-name-txt">실제 결제</span></span><span class="bd-share">${fmt(ppaid)}원</span></div></div>`;
}

// ── UTILS ──
function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s||'').replace(/"/g,'&quot;');}
function ja(s){return JSON.stringify(String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtAmt(v){if(v===''||v===null||v===undefined)return '';const n=+v;return isNaN(n)||n===0?'':n.toLocaleString('ko-KR');}

function handleAmtKeydown(e){
  if(['Backspace','Delete','Tab','Escape','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'].includes(e.key))return;
  if((e.ctrlKey||e.metaKey)&&['a','c','v','x','z'].includes(e.key.toLowerCase()))return;
  // 숫자 0-9 + 음수 부호 (-) 허용. 단, '-'는 빈 칸이거나 맨 앞에서만.
  if(/^\d$/.test(e.key))return;
  if(e.key==='-'){
    const el=e.target,start=el.selectionStart;
    if(start===0&&!el.value.startsWith('-'))return;
  }
  e.preventDefault();
}

function handleAmtInput(id,el){
  const posFromEnd=el.value.length-el.selectionStart;
  const sign=el.value.trim().startsWith('-')?-1:1;
  const raw=el.value.replace(/[^0-9]/g,'');
  let num='';
  if(raw!==''){num=parseInt(raw,10)*sign;}
  // 표시값 재구성 (음수면 - 접두)
  el.value=num===''?'':(num<0?'-'+Math.abs(num).toLocaleString('ko-KR'):num.toLocaleString('ko-KR'));
  const newPos=Math.max(0,el.value.length-posFromEnd);
  el.setSelectionRange(newPos,newPos);
  updateField(id,'amount',num);
}

function toggleAmtSign(id){
  const it=items.find(i=>i.id===id);
  if(!it)return;
  const cur=+it.amount||0;
  if(cur===0)return; // 금액이 0/빈값이면 토글 무시
  it.amount=-cur;
  saveState();
  renderAll();
  // 모바일 시트가 열려있으면 시트 내용도 갱신
  const sheet=document.getElementById('mSheet');
  if(sheet&&sheet.classList.contains('open'))renderSheetBody(id);
}

// ── SHARE / IMAGE EXPORT ──
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

const iconImgCache=new Map();
async function loadIconImage(svgStr,color){
  const key=svgStr+'|'+color;
  if(iconImgCache.has(key))return iconImgCache.get(key);
  const colored=svgStr.replace(/currentColor/g,color);
  const blob=new Blob([colored],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  try{
    const img=new Image();
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=url;});
    iconImgCache.set(key,img);
    return img;
  }finally{
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
}

async function generateSettleCanvas(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);
  const{paid,owes,hasRounding}=computeShares();
  const txns=calcTxns(paid,owes);
  const validItems=items.filter(it=>+it.amount!==0);
  // pre-load icons
  const iconMap=new Map();
  for(const it of validItems){
    const svg=getIconSvg(it);
    if(!iconMap.has(svg)){
      try{iconMap.set(svg,await loadIconImage(svg,'#0055B8'));}catch(e){iconMap.set(svg,null);}
    }
  }
  const W=520,PAD=22,dpr=2;
  const cardX=PAD,cardW=W-PAD*2;
  const TITLE_BLOCK_H=60,TOTAL_CARD_H=118;
  const SECTION_GAP=18,SECTION_TITLE_H=26;
  const TXN_ROW_H=52,ITEM_ROW_H=58;
  let H=PAD+TITLE_BLOCK_H+TOTAL_CARD_H;
  if(txns.length)H+=SECTION_GAP+SECTION_TITLE_H+txns.length*TXN_ROW_H;
  if(validItems.length)H+=SECTION_GAP+SECTION_TITLE_H+validItems.length*ITEM_ROW_H;
  H+=44+PAD;
  const canvas=document.createElement('canvas');
  canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const FF="-apple-system,BlinkMacSystemFont,'Helvetica Neue','Apple SD Gothic Neo',sans-serif";
  const setFont=(s,w)=>{ctx.font=`${w||'normal'} ${s}px ${FF}`;};
  const drawCard=(x,y,w,h)=>{
    ctx.fillStyle='#fff';
    ctx.strokeStyle='#EBEBED';
    ctx.lineWidth=1;
    roundRectPath(ctx,x,y,w,h,16);
    ctx.fill();ctx.stroke();
  };
  // bg
  ctx.fillStyle='#F7F7F8';
  ctx.fillRect(0,0,W,H);
  let y=PAD;
  // title
  ctx.fillStyle='#111';
  setFont(22,700);
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('정산 내역',cardX,y);
  // date subtitle
  const dateStr=getSettleDateStr();
  if(dateStr){
    ctx.fillStyle='#999';
    setFont(13,500);
    ctx.fillText(dateStr,cardX,y+30);
  }
  y+=TITLE_BLOCK_H;
  // total card
  drawCard(cardX,y,cardW,TOTAL_CARD_H);
  ctx.fillStyle='#666';
  setFont(13);
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('총 지출금액',W/2,y+30);
  ctx.fillStyle=total<0?'#E53E3E':'#111';
  setFont(36,700);
  ctx.fillText(fmt(total)+'원',W/2,y+58);
  y+=TOTAL_CARD_H;
  // txns
  if(txns.length){
    y+=SECTION_GAP;
    ctx.fillStyle='#666';
    setFont(11,600);
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('송금',cardX+4,y+6);
    y+=SECTION_TITLE_H;
    const h=txns.length*TXN_ROW_H;
    drawCard(cardX,y,cardW,h);
    txns.forEach((t,i)=>{
      const ry=y+i*TXN_ROW_H+TXN_ROW_H/2;
      ctx.fillStyle='#111';
      setFont(14,500);
      ctx.textBaseline='middle';
      ctx.textAlign='left';
      const fx=cardX+18;
      ctx.fillText(t.from,fx,ry);
      const fw=ctx.measureText(t.from).width;
      setFont(13,400);
      ctx.fillStyle='#999';
      ctx.fillText('→',fx+fw+8,ry);
      const aw=ctx.measureText('→').width;
      setFont(14,500);
      ctx.fillStyle='#111';
      ctx.fillText(t.to,fx+fw+8+aw+8,ry);
      setFont(17,700);
      ctx.textAlign='right';
      ctx.fillText(fmt(t.amt)+'원',cardX+cardW-18,ry);
      if(i<txns.length-1){
        ctx.strokeStyle='#EBEBED';ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(cardX+16,y+(i+1)*TXN_ROW_H);
        ctx.lineTo(cardX+cardW-16,y+(i+1)*TXN_ROW_H);
        ctx.stroke();
      }
    });
    y+=h;
  }
  // items
  if(validItems.length){
    y+=SECTION_GAP;
    ctx.fillStyle='#666';
    setFont(11,600);
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('결제 내역',cardX+4,y+6);
    y+=SECTION_TITLE_H;
    const h=validItems.length*ITEM_ROW_H;
    drawCard(cardX,y,cardW,h);
    validItems.forEach((it,i)=>{
      const ry=y+i*ITEM_ROW_H+ITEM_ROW_H/2;
      const icx=cardX+18+14;
      // icon circle
      ctx.fillStyle='#EBF3FF';
      ctx.beginPath();
      ctx.arc(icx,ry,14,0,Math.PI*2);
      ctx.fill();
      // icon image
      const iconImg=iconMap.get(getIconSvg(it));
      if(iconImg){ctx.drawImage(iconImg,icx-8,ry-8,16,16);}
      // name
      const nx=icx+14+10;
      const name=it.name||'(이름 없음)';
      ctx.fillStyle='#111';
      setFont(13,500);
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(name,nx,ry);
      const nw=ctx.measureText(name).width;
      // chip (총합에 차액 발생 시에만)
      const n=(it.members.length||people.length)||1;
      const rem=Math.abs((+it.amount)%n);
      if(hasRounding&&rem>0){
        const txt='차액 '+rem+'원';
        setFont(10,500);
        const cw=ctx.measureText(txt).width+12;
        const ch=18;
        const cx=nx+nw+8;
        const cy=ry-ch/2;
        ctx.fillStyle='#EBF3FF';
        roundRectPath(ctx,cx,cy,cw,ch,4);
        ctx.fill();
        ctx.fillStyle='#0055B8';
        setFont(10,500);
        ctx.textAlign='center';
        ctx.fillText(txt,cx+cw/2,ry);
      }
      // amount (음수면 빨간색)
      ctx.fillStyle=(+it.amount<0)?'#E53E3E':'#111';
      setFont(17,700);
      ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillText(fmt(+it.amount)+'원',cardX+cardW-18,ry);
      if(i<validItems.length-1){
        ctx.strokeStyle='#EBEBED';ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(cardX+16,y+(i+1)*ITEM_ROW_H);
        ctx.lineTo(cardX+cardW-16,y+(i+1)*ITEM_ROW_H);
        ctx.stroke();
      }
    });
    y+=h;
  }
  // notice (차액 발생 시에만)
  if(hasRounding){
    y+=24;
    ctx.fillStyle='#B0B0B8';
    setFont(11);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('차액은 결제자에게 우선 부담돼요',W/2,y);
  }
  return canvas;
}

async function shareSettleImage(){
  const total=items.reduce((s,it)=>s+(+it.amount||0),0);
  if(!total){toast('공유할 정산 내역이 없어요',{type:'error'});return;}
  // 인앱 브라우저(카톡·네이버 등)는 Web Share 파일 공유 미지원 → 외부 브라우저 유도
  const inApp=detectInAppBrowser();
  if(inApp){
    const ok=confirm(`${inApp.name} 내부 브라우저는 이미지 공유가 제한돼요.\n외부 브라우저(Chrome·Safari·삼성인터넷)에서 열어주세요.\n\n지금 외부 브라우저로 열까요?`);
    if(ok){openInExternalBrowser();return;}
    // 사용자가 취소하면: 다운로드라도 진행
  }
  const canvas=await generateSettleCanvas();
  const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
  if(!blob){toast('이미지 생성에 실패했어요',{type:'error'});return;}
  const date=new Date().toISOString().slice(0,10);
  const filename=`정산_${date}.png`;
  const file=new File([blob],filename,{type:'image/png'});
  // Web Share API — 모바일에서 OS 공유 시트 → 카톡/문자 직접 선택
  if(navigator.share&&!inApp){
    try{
      await navigator.share({files:[file]});
      return; // ✓ 성공: 다운로드 안 함
    }catch(e){
      if(e&&e.name==='AbortError')return; // 사용자 취소
      // 다른 에러: 다운로드로 폴백
    }
  }
  // 다운로드 폴백 (Web Share 미지원 또는 인앱에서 취소)
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.download=filename;a.href=url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
